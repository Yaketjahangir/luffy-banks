name: Docker Build & Push

on:
  push:
    branches: [ "master" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build JAR
        run: mvn clean install -DskipTests
        working-directory: luffy-banks   # 🔥 FIX HERE

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/luffy-bank .

      - name: Login Docker
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/luffy-bank

